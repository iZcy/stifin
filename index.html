<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StifIn - Humanize AI Text</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-left">
        <span class="logo">StifIn</span>
        <span class="tagline">buat teks AI kedengeran lebih natural</span>
      </div>
      <div class="header-right">
        <span class="char-count-header" id="headerCounter">0 karakter</span>
      </div>
    </header>

    <main class="main">
      <section class="panel panel-output">
        <div class="panel-header">
          <span class="panel-label">📋 Hasil Humanize</span>
        </div>
        <div class="panel-body">
          <div class="output-area" id="outputArea">
            <p class="placeholder-text">Hasil humanize akan muncul di sini...</p>
          </div>
        </div>
        <div class="panel-footer">
          <span class="stats" id="outputStats">🔤 0 kata &middot; 0 karakter</span>
          <button class="btn btn-copy" id="copyBtn">
            <span class="btn-icon">📋</span> Copy
          </button>
        </div>
      </section>

      <div class="divider"></div>

      <section class="panel panel-input">
        <div class="panel-header">
          <span class="panel-label">✏️ Teks AI</span>
        </div>
        <div class="panel-body">
          <textarea class="input-area" id="inputArea" placeholder="Tempel teks AI di sini..." spellcheck="true"></textarea>
        </div>
        <div class="panel-footer">
          <span class="stats" id="inputStats">🔤 0 kata &middot; 0 karakter</span>
          <button class="btn btn-clear" id="clearBtn">
            <span class="btn-icon">🗑️</span> Hapus
          </button>
        </div>
      </section>
    </main>

    <footer class="footer">
      <button class="btn btn-humanize" id="humanizeBtn">
        <span class="btn-icon">🤖</span> Humanize!
      </button>
    </footer>
  </div>

  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
